name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Show environment
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: List installed packages
        run: pip list

      - name: Verify imports
        run: |
          python -c "from utils import extract_video_id, clean_transcript; print('utils OK')"
          python -c "from content_detector import detect_content_type; print('content_detector OK')"
          python -c "from keywords import extract_keywords; print('keywords OK')"

      - name: Run unit tests
        run: pytest tests/ -v
